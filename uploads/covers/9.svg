<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1080" viewBox="0 0 720 1080">
<defs>
  <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#581c87"/>
    <stop offset="100%" stop-color="#111827"/>
  </linearGradient>
  <pattern id="lines" width="36" height="36" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="36" stroke="#ffffff" stroke-opacity="0.06" stroke-width="4"/>
  </pattern>
</defs>
<rect width="720" height="1080" fill="url(#paper)"/>
<rect width="720" height="1080" fill="url(#lines)"/>
<rect x="48" y="48" width="624" height="984" fill="none" stroke="#facc15" stroke-width="6"/>
<rect x="78" y="78" width="564" height="924" fill="none" stroke="#facc15" stroke-width="2" opacity="0.75"/>
<line x1="120" y1="250" x2="600" y2="250" stroke="#facc15" stroke-width="4"/>
<line x1="120" y1="850" x2="600" y2="850" stroke="#facc15" stroke-width="4"/>
<style>
