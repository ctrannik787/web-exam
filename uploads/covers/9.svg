  .author { font-family: Arial, DejaVu Sans, sans-serif; font-size: 34px; font-weight: 500; text-anchor: middle; fill: #f8fafc; }
  .year { font-family: Arial, DejaVu Sans, sans-serif; font-size: 42px; font-weight: 700; text-anchor: middle; fill: #facc15; }
</style>
<text x="360" y="300" class="title">ГАРРИ ПОТТЕР И</text>
