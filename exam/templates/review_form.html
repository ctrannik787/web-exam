{% extends "base.html" %}
{% block title %}Рецензия{% endblock %}
{% block content %}
<h1 class="h3 mb-3">Рецензия на книгу «{{ book.title }}»</h1>
<form method="post">
    <div class="mb-3">
        <label class="form-label" for="rating">Оценка</label>
        <select class="form-select" id="rating" name="rating" required>
            {% for value, label in rating_options %}
                <option value="{{ value }}" {% if value == 5 %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label" for="text">Текст рецензии</label>
        <textarea class="form-control" id="text" name="text" required data-editor="markdown">{{ request.form.get('text', '') }}</textarea>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Сохранить</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('view_book', book_id=book.id) }}">Отмена</a>
    </div>
</form>
{% endblock %}
